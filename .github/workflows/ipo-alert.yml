name: A股主板打新提醒

on:
  schedule:
    # 每周一到周五 北京时间 08:00 运行
    # cron 使用 UTC 时间，北京+8小时，所以是 00:00 UTC
    - cron: '0 0 * * 1-5'
  workflow_dispatch:  # 允许手动触发测试

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行打新提醒脚本
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: python ipo-alert/ipo_alert.py
