name: A股主板打新提醒

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt || pip install requests

      - name: 运行打新提醒脚本
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
        run: |
          SCRIPT=$(find . -name "ipo_alert.py" -type f | head -1)
          echo "找到脚本: $SCRIPT"
          cd "$(dirname "$SCRIPT")"
          python ipo_alert.py
